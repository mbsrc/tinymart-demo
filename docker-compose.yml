services:
  postgres:
    image: postgres:16-alpine
    container_name: tinymart-db
    environment:
      POSTGRES_USER: tinymart
      POSTGRES_PASSWORD: tinymart
      POSTGRES_DB: tinymart_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinymart"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
